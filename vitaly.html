<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VITALY — Espace de commande</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif;}
:root{--g:#1E5C3A;--g2:#2d7a50;--cr:#F5F0E8;--or:#E8613A;--gr:#888780;--lg:#B4B2A9;--bd:rgba(0,0,0,0.08);--pu:#7B5EA7;}
body{background:var(--g);min-height:100vh;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}
#sh{align-items:center;padding:24px 14px;background:var(--g);}
.logo{text-align:center;margin-bottom:20px;}
.logo-ic{width:56px;height:56px;background:var(--cr);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 7px;}
.logo-t{color:var(--cr);font-size:21px;font-weight:700;letter-spacing:3px;}
.logo-s{color:var(--or);font-size:11px;font-weight:600;letter-spacing:1px;margin-top:2px;}
.hcard{background:var(--cr);border-radius:16px;padding:18px;width:100%;max-width:540px;}
.slbl{font-size:9px;letter-spacing:2px;color:var(--gr);margin-bottom:9px;text-align:center;}
.prow{display:flex;gap:7px;margin-bottom:13px;}
.pbtn{flex:1;display:flex;align-items:center;gap:9px;background:var(--g);border-radius:10px;padding:11px;cursor:pointer;border:none;}
.pbtn:hover{opacity:.88;}
.pbic{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.pbn{color:var(--cr);font-size:12px;font-weight:700;}
.pbd{color:rgba(245,240,232,.6);font-size:9px;}
.hdiv{border:none;border-top:.5px solid rgba(0,0,0,.1);margin:10px 0;}
.slbl2{font-size:9px;letter-spacing:2px;color:var(--gr);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.slbl2 span{color:var(--or);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sbtn{display:flex;align-items:center;gap:7px;background:#fff;border-radius:9px;padding:9px 11px;cursor:pointer;border:.5px solid var(--bd);width:100%;}
.sbtn:hover{background:#f0ece4;}
.sbic{width:32px;height:32px;background:var(--g);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.sbn{color:#2C2C2A;font-size:11px;font-weight:700;}
.sbh{color:var(--lg);font-size:9px;}
.sblk{color:var(--lg);font-size:13px;margin-left:auto;}
.sfull{grid-column:1/-1;}
#sp{align-items:center;justify-content:center;padding:36px 14px;background:var(--g);}
.pcard{background:var(--cr);border-radius:16px;padding:24px 20px;width:100%;max-width:290px;text-align:center;}
.pt{font-size:17px;font-weight:700;color:var(--g);margin-bottom:4px;}
.pbadge{display:inline-block;background:var(--g);color:var(--cr);font-size:9px;padding:3px 9px;border-radius:20px;margin-bottom:16px;}
.phint{font-size:10px;color:var(--gr);margin-bottom:9px;letter-spacing:1px;}
.pdots{display:flex;gap:9px;justify-content:center;margin-bottom:5px;}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--g);background:transparent;transition:background .15s;}
.pdot.filled{background:var(--g);}
.perr{color:var(--or);font-size:10px;margin-bottom:6px;min-height:13px;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.pkey{background:#fff;border:.5px solid rgba(0,0,0,.1);border-radius:8px;padding:12px;font-size:16px;font-weight:600;color:#2C2C2A;cursor:pointer;}
.pkey:hover{background:#e8e4dc;}
.pkey.del{font-size:12px;color:var(--gr);}
.pback{margin-top:12px;background:transparent;border:none;color:var(--gr);font-size:11px;cursor:pointer;text-decoration:underline;}
.hdr{background:var(--g);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.hdr-back{background:transparent;border:none;color:rgba(245,240,232,.7);font-size:11px;cursor:pointer;}
.hdr-center{flex:1;text-align:center;}
.hdr-lbl{color:rgba(245,240,232,.5);font-size:8px;letter-spacing:1px;}
.hdr-val{color:var(--cr);font-size:13px;font-weight:700;}
.hdr-badge{background:rgba(245,240,232,.15);border:.5px solid rgba(245,240,232,.3);border-radius:6px;padding:4px 9px;color:var(--cr);font-size:10px;font-weight:700;}
.tabs{background:#fff;border-bottom:.5px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:9px 13px;font-size:11px;color:var(--gr);cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;white-space:nowrap;transition:all .15s;}
.tab.active{color:var(--g);border-bottom-color:var(--g);font-weight:700;}
.tc{display:none;flex:1;flex-direction:column;}
.tc.active{display:flex;}
#ss{background:#F5F0E8;min-height:100vh;}
.pdv-body{padding:10px;flex:1;overflow-y:auto;}
.sub-title{font-size:9px;letter-spacing:2px;color:var(--gr);font-weight:700;margin-bottom:6px;padding:0 2px;margin-top:10px;}
.sub-title:first-child{margin-top:0;}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:4px;}
.icard{background:#fff;border:.5px solid var(--bd);border-radius:9px;padding:10px;}
.icn{font-size:10px;font-weight:700;color:#2C2C2A;margin-bottom:1px;line-height:1.3;}
.icr{font-size:9px;color:var(--lg);margin-bottom:6px;}
.stk-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;padding-bottom:6px;border-bottom:.5px solid var(--bd);}
.stk-lbl{font-size:9px;color:var(--gr);white-space:nowrap;}
.stk-inp{width:50px;text-align:center;border:.5px solid rgba(0,0,0,.15);border-radius:6px;padding:4px 3px;font-size:13px;font-weight:700;color:var(--g);background:var(--cr);}
.qrow{display:flex;align-items:center;gap:5px;}
.qm,.qp{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.qm{background:#F5F0E8;color:var(--gr);}
.qm:hover{background:#e8e4dc;}
.qp{background:var(--or);color:#fff;margin-left:auto;}
.qp:hover{opacity:.85;}
.qv{flex:1;text-align:center;font-size:14px;color:#2C2C2A;font-weight:700;}
.pdv-footer{padding:10px 12px;background:#fff;border-top:.5px solid var(--bd);flex-shrink:0;}
.footer-sum{font-size:11px;color:var(--gr);margin-bottom:7px;}
.footer-btns{display:flex;gap:6px;flex-wrap:wrap;}
.fbtn{flex:1;min-width:110px;padding:10px;border-radius:9px;border:none;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;}
.fbtn:hover{opacity:.88;}
.btn-chef{background:var(--g);color:var(--cr);}
.btn-mgr{background:var(--pu);color:#fff;}
.btn-stk{background:var(--or);color:#fff;}
.route-info{font-size:9px;padding:5px 10px;border-radius:6px;margin:8px 10px 0;text-align:center;font-weight:600;}
.route-chef{background:rgba(30,92,58,.1);color:var(--g);}
.route-mgr{background:rgba(123,94,167,.1);color:var(--pu);}
#sc,#sm{background:#F5F0E8;min-height:100vh;}
.empty-st{text-align:center;padding:32px 16px;color:var(--gr);font-size:12px;}
.empty-ic{font-size:32px;margin-bottom:8px;}
.ocard{background:#fff;border:.5px solid var(--bd);border-radius:9px;padding:12px;margin-bottom:8px;}
.ocard-head{display:flex;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px;}
.ocard-store{font-size:12px;font-weight:700;color:var(--g);}
.ocard-date{font-size:10px;color:var(--gr);margin-left:auto;}
.cat-bdg{display:inline-block;background:rgba(30,92,58,.09);color:var(--g);font-size:9px;padding:2px 7px;border-radius:5px;margin:0 3px 3px 0;}
.irow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:.5px solid var(--bd);font-size:11px;}
.irow:last-child{border:none;}
.irow-q{font-weight:700;color:var(--g);}
.pdf-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.pdf-btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:7px;padding:8px 13px;font-size:11px;font-weight:700;cursor:pointer;}
.pdf-btn:hover{opacity:.88;}
.pdf-btn-bc{background:var(--g);color:var(--cr);}
.pdf-btn-bl{background:var(--or);color:#fff;}
.pdf-btn-mgr{background:var(--pu);color:#fff;}
.chef-cat-section{margin-bottom:14px;}
.chef-cat-lbl{font-size:9px;letter-spacing:2px;color:var(--gr);font-weight:700;margin-bottom:6px;padding:4px 8px;background:rgba(30,92,58,.07);border-radius:5px;display:inline-block;}
.mgr-body{padding:10px;flex:1;overflow-y:auto;}
.mgr-empty{text-align:center;padding:32px 16px;color:var(--gr);font-size:12px;}
.five-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:8px;}
.pdv-card{background:#fff;border:.5px solid var(--bd);border-radius:11px;overflow:hidden;display:flex;flex-direction:column;}
.pdv-card-head{background:var(--g);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pdv-card-name{color:var(--cr);font-size:11px;font-weight:700;letter-spacing:.5px;}
.pdv-card-total{background:rgba(255,255,255,.22);color:var(--cr);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.pdv-card-empty{padding:14px 12px;font-size:10px;color:var(--lg);text-align:center;font-style:italic;}
.card-sub{padding:6px 10px 4px;}
.card-sub+.card-sub{border-top:.5px solid rgba(0,0,0,.06);}
.card-sub-lbl{font-size:8px;letter-spacing:1.5px;color:var(--gr);font-weight:700;margin-bottom:4px;text-transform:uppercase;}
.card-item{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:.5px solid rgba(0,0,0,.04);font-size:10px;}
.card-item:last-child{border:none;}
.card-item-name{color:#2C2C2A;flex:1;padding-right:6px;line-height:1.3;}
.card-item-qty{font-weight:700;color:var(--g);white-space:nowrap;}
.card-item-unit{font-size:8px;color:var(--lg);margin-left:2px;font-weight:400;}
.stock-card-head{background:var(--pu);}
#ssucc{background:var(--g);align-items:center;justify-content:center;text-align:center;padding:36px 18px;min-height:100vh;}
.succ-ic{font-size:48px;margin-bottom:12px;}
.succ-t{color:var(--cr);font-size:17px;font-weight:700;margin-bottom:5px;}
.succ-s{color:rgba(245,240,232,.7);font-size:12px;margin-bottom:20px;line-height:1.6;white-space:pre-line;}
.succ-btn{background:var(--cr);color:var(--g);border:none;border-radius:10px;padding:12px 24px;font-size:13px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<!-- HOME -->
<div id="sh" class="screen active">
  <div class="logo"><div class="logo-ic">🥗</div><div class="logo-t">VITALY</div><div class="logo-s">ESPACE DE COMMANDE</div></div>
  <div class="hcard">
    <div class="slbl">SÉLECTIONNEZ VOTRE ESPACE</div>
    <div class="prow">
      <button class="pbtn" onclick="goPin('chef','Espace Chef')"><div class="pbic">👨‍🍳</div><div><div class="pbn">CHEF</div><div class="pbd">Commandes LABO</div></div></button>
      <button class="pbtn" style="background:var(--pu);" onclick="goPin('manager','Espace Manager')"><div class="pbic">📊</div><div><div class="pbn">MANAGER</div><div class="pbd">Tous les fournisseurs</div></div></button>
    </div>
    <hr class="hdiv">
    <div class="slbl2">POINTS DE VENTE <span>VITALY</span></div>
    <div class="sgrid">
      <button class="sbtn" onclick="goPin('LePort','Le Port')"><div class="sbic">🌊</div><div><div class="sbn">LE PORT</div><div class="sbh">Code à 4 chiffres</div></div><span class="sblk">🔒</span></button>
      <button class="sbtn" onclick="goPin('SacreCoeur','Sacré Coeur')"><div class="sbic">⛪</div><div><div class="sbn">SACRÉ COEUR</div><div class="sbh">Code à 4 chiffres</div></div><span class="sblk">🔒</span></button>
      <button class="sbtn" onclick="goPin('Portail','Portail')"><div class="sbic">🚪</div><div><div class="sbn">PORTAIL</div><div class="sbh">Code à 4 chiffres</div></div><span class="sblk">🔒</span></button>
      <button class="sbtn" onclick="goPin('Savannah','Savannah')"><div class="sbic">🌿</div><div><div class="sbn">SAVANNAH</div><div class="sbh">Code à 4 chiffres</div></div><span class="sblk">🔒</span></button>
      <button class="sbtn sfull" onclick="goPin('ZAC2000','ZAC 2000')"><div class="sbic">🏢</div><div><div class="sbn">ZAC 2000</div><div class="sbh">Code à 4 chiffres</div></div><span class="sblk">🔒</span></button>
    </div>
  </div>
</div>

<!-- PIN -->
<div id="sp" class="screen">
  <div class="pcard">
    <div class="pt" id="pin-title">—</div><div class="pbadge" id="pin-badge">—</div>
    <div class="phint">ENTREZ VOTRE CODE</div>
    <div class="pdots" id="pdots"><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div></div>
    <div class="perr" id="perr"></div>
    <div class="pgrid">
      <button class="pkey" onclick="pk('1')">1</button><button class="pkey" onclick="pk('2')">2</button><button class="pkey" onclick="pk('3')">3</button>
      <button class="pkey" onclick="pk('4')">4</button><button class="pkey" onclick="pk('5')">5</button><button class="pkey" onclick="pk('6')">6</button>
      <button class="pkey" onclick="pk('7')">7</button><button class="pkey" onclick="pk('8')">8</button><button class="pkey" onclick="pk('9')">9</button>
      <button class="pkey"></button><button class="pkey" onclick="pk('0')">0</button><button class="pkey del" onclick="pdel()">⌫</button>
    </div>
    <button class="pback" onclick="show('sh')">← Retour</button>
  </div>
</div>

<!-- PDV -->
<div id="ss" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="show('sh')">← Quitter</button>
    <div class="hdr-center"><div class="hdr-lbl">COMMANDE POUR</div><div class="hdr-val" id="ss-date">—</div></div>
    <div class="hdr-badge" id="ss-badge">—</div>
  </div>
  <div class="tabs" id="ss-tabs"></div>
  <div id="ss-tcs" style="flex:1;overflow-y:auto;"></div>
  <div class="pdv-footer">
    <div class="footer-sum" id="ss-sum">0 article(s)</div>
    <div class="footer-btns">
      <button class="fbtn btn-stk" onclick="sendStock()">📦 Envoyer stock</button>
      <button class="fbtn btn-chef" onclick="sendOrders('chef')">👨‍🍳 LABO → Chef</button>
      <button class="fbtn btn-mgr" onclick="sendOrders('manager')">📊 Fournisseurs → Manager</button>
    </div>
  </div>
</div>

<!-- CHEF -->
<div id="sc" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="show('sh')">← Quitter</button>
    <div class="hdr-center"><div class="hdr-val">ESPACE CHEF</div></div>
    <div class="hdr-badge">👨‍🍳 Chef</div>
  </div>
  <div class="tabs" id="sc-tabs"></div>
  <div id="sc-tcs" style="flex:1;overflow-y:auto;padding:10px;"></div>
</div>

<!-- MANAGER -->
<div id="sm" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="show('sh')">← Quitter</button>
    <div class="hdr-center"><div class="hdr-val">ESPACE MANAGER</div></div>
    <div class="hdr-badge">📊 Manager</div>
  </div>
  <div class="tabs" id="sm-tabs"></div>
  <div id="sm-tcs" style="flex:1;overflow-y:auto;"></div>
</div>

<!-- SUCCESS -->
<div id="ssucc" class="screen">
  <div class="succ-ic" id="succ-ic">✅</div>
  <div class="succ-t" id="succ-t">—</div>
  <div class="succ-s" id="succ-s">—</div>
  <button class="succ-btn" id="succ-back">← Retour</button>
</div>

let st={profile:'',storeKey:'',pin:'',quantities:{},stocks:{}};
const db={chef:[],manager:[],stocks:[]};
// --- PERSISTENCE avec localStorage ---
function saveDB(){try{localStorage.setItem('vitaly_db',JSON.stringify(db));}catch(e){}}
function loadDB(){try{const d=localStorage.getItem('vitaly_db');if(d){const p=JSON.parse(d);Object.assign(db,p);}}catch(e){}}
loadDB();
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function fmtDate(){const d=new Date();const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];const months=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();}
function fmtShort(){return new Date().toLocaleDateString('fr-FR');}
function fmtTime(){return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function safeId(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
function getSubs(cat){const o=[];(PRODUCTS[cat]||[]).forEach(p=>{if(!o.includes(p.sub))o.push(p.sub);});return o;}
function hasSingleSub(cat){return new Set((PRODUCTS[cat]||[]).map(p=>p.sub)).size===1;}
function goPin(profile,label){
  st.profile=profile;st.pin='';
  document.getElementById('pin-title').textContent=label.toUpperCase();
  document.getElementById('pin-badge').textContent=STORE_KEYS.includes(profile)?'Point de vente':label;
  document.querySelectorAll('.pdot').forEach(d=>d.classList.remove('filled'));
  document.getElementById('perr').textContent='';show('sp');
}
function pk(n){
  if(!n||st.pin.length>=4)return;st.pin+=n;
  document.querySelectorAll('.pdot').forEach((d,i)=>d.classList.toggle('filled',i<st.pin.length));
  document.getElementById('perr').textContent='';
  if(st.pin.length===4)setTimeout(checkPin,200);
}
function pdel(){st.pin=st.pin.slice(0,-1);document.querySelectorAll('.pdot').forEach((d,i)=>d.classList.toggle('filled',i<st.pin.length));}
function checkPin(){
  if(st.pin===PINS[st.profile]){
    if(st.profile==='chef')openChef();
    else if(st.profile==='manager')openManager();
    else{st.storeKey=st.profile;openStore();}
  }else{
    document.getElementById('perr').textContent='Code incorrect. Réessayez.';
    st.pin='';document.querySelectorAll('.pdot').forEach(d=>d.classList.remove('filled'));
  }
}
function openStore(){
  st.quantities={};st.stocks={};
  document.getElementById('ss-date').textContent=fmtDate();
  document.getElementById('ss-badge').textContent=STORE_NAMES[st.storeKey];
  buildPdvTabs();show('ss');
}
function buildPdvTabs(){
  const tabsEl=document.getElementById('ss-tabs'),tcsEl=document.getElementById('ss-tcs');
  tabsEl.innerHTML='';tcsEl.innerHTML='';
  PDV_CATS.forEach((cat,ci)=>{
    const dest=catDest(cat);
    const btn=document.createElement('button');
    btn.className='tab'+(ci===0?' active':'');
    btn.innerHTML=cat+'<span style="display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:5px;vertical-align:middle;background:'+(dest==='chef'?'var(--g)':'var(--pu)')+'"></span>';
    btn.onclick=(c=>()=>{
      document.querySelectorAll('#ss-tabs .tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('#ss-tcs .tc').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');document.getElementById('pdvtc-'+safeId(c)).classList.add('active');updateFooter();
    })(cat);
    tabsEl.appendChild(btn);
    const tc=document.createElement('div');tc.className='tc'+(ci===0?' active':'');tc.id='pdvtc-'+safeId(cat);tc.style.overflowY='auto';
    const banner=document.createElement('div');banner.className='route-info '+(dest==='chef'?'route-chef':'route-mgr');
    banner.textContent=dest==='chef'?'👨‍🍳 Cette commande sera envoyée au Chef':'📊 Cette commande sera envoyée au Manager';
    tc.appendChild(banner);
    const body=document.createElement('div');body.className='pdv-body';
    const prods=PRODUCTS[cat]||[];const subs={};
    prods.forEach((p,i)=>{if(!subs[p.sub])subs[p.sub]=[];subs[p.sub].push({p,i});});
    Object.keys(subs).forEach(sub=>{
      const st2=document.createElement('div');st2.className='sub-title';st2.textContent=sub.toUpperCase();body.appendChild(st2);
      const grid=document.createElement('div');grid.className='items-grid';
      subs[sub].forEach(({p,i})=>{
        const key=cat+'__'+i;const card=document.createElement('div');card.className='icard';
        card.innerHTML='<div class="stk-row"><span class="stk-lbl">STOCK</span><input class="stk-inp" type="number" min="0" value="0" oninput="st.stocks[\''+key+'\']=parseInt(this.value)||0"></div><div class="icn">'+p.name+'</div><div class="icr">'+p.unit+'</div><div class="qrow"><button class="qm" onclick="chg(\''+key+'\',-1)">−</button><span class="qv" id="qv-'+safeId(key)+'">0</span><button class="qp" onclick="chg(\''+key+'\',1)">+</button></div>';
        grid.appendChild(card);
      });
      body.appendChild(grid);
    });
    tc.appendChild(body);tcsEl.appendChild(tc);
  });
  updateFooter();
}
function chg(key,d){
  st.quantities[key]=Math.max(0,(st.quantities[key]||0)+d);
  const el=document.getElementById('qv-'+safeId(key));if(el)el.textContent=st.quantities[key];updateFooter();
}
function updateFooter(){
  const chefT=Object.keys(st.quantities).filter(k=>catDest(k.split('__')[0])==='chef'&&st.quantities[k]>0).reduce((a,k)=>a+st.quantities[k],0);
  const mgrT=Object.keys(st.quantities).filter(k=>catDest(k.split('__')[0])==='manager'&&st.quantities[k]>0).reduce((a,k)=>a+st.quantities[k],0);
  document.getElementById('ss-sum').innerHTML='<span style="color:var(--g)">👨‍🍳 Chef : <strong>'+chefT+'</strong></span> &nbsp;·&nbsp; <span style="color:var(--pu)">📊 Manager : <strong>'+mgrT+'</strong></span>';
}
function sendOrders(dest){
  const sName=STORE_NAMES[st.storeKey];
  const filtered={};
  Object.keys(st.quantities).forEach(key=>{if(catDest(key.split('__')[0])===dest&&st.quantities[key]>0)filtered[key]=st.quantities[key];});
  if(!Object.keys(filtered).length){alert('Aucun article pour '+(dest==='chef'?'le Chef (LABO)':'le Manager')+'.');return;}
  const cats=[...new Set(Object.keys(filtered).map(k=>k.split('__')[0]))];
  const entry={storeKey:st.storeKey,storeName:sName,date:fmtShort(),time:fmtTime(),quantities:{...filtered},cats};
  if(dest==='chef')db.chef.push(entry);else db.manager.push(entry);
  saveDB();
  const total=Object.values(filtered).reduce((a,b)=>a+b,0);
  document.getElementById('succ-ic').textContent=dest==='chef'?'👨‍🍳':'📊';
  document.getElementById('succ-t').textContent=dest==='chef'?'Envoyé au Chef !':'Envoyé au Manager !';
  document.getElementById('succ-s').textContent=total+' article(s) · '+cats.join(', ')+'\n'+sName+' — '+fmtShort()+' '+fmtTime();
  document.getElementById('succ-back').onclick=()=>show('ss');show('ssucc');
}
function sendStock(){
  db.stocks=db.stocks.filter(s=>s.storeKey!==st.storeKey);
  db.stocks.push({storeKey:st.storeKey,storeName:STORE_NAMES[st.storeKey],date:fmtShort(),time:fmtTime(),stocks:{...st.stocks}});
  saveDB();
  document.getElementById('succ-ic').textContent='📦';
  document.getElementById('succ-t').textContent='Stock envoyé !';
  document.getElementById('succ-s').textContent='Stock de '+STORE_NAMES[st.storeKey]+'\ntransmis au Chef & Manager.';
  document.getElementById('succ-back').onclick=()=>show('ss');show('ssucc');
}
function openChef(){
  buildTabs('sc-tabs','sc-tcs',[...STORE_KEYS,'stocks_chef'],(sk,tcid)=>{
    if(sk==='stocks_chef')renderStocks(tcid);else renderChefStore(tcid,sk);
  },sk=>sk==='stocks_chef'?'📦 Stocks PDV':STORE_NAMES[sk]);
  show('sc');
}
function renderChefStore(tcid,sk){
  const tc=document.getElementById(tcid);
  const orders=db.chef.filter(o=>o.storeKey===sk);
  if(!orders.length){tc.innerHTML='<div class="empty-st"><div class="empty-ic">📭</div>Aucune commande LABO de '+STORE_NAMES[sk]+'.</div>';return;}
  let html='';
  [...orders].reverse().forEach(o=>{
    const grouped={};
    Object.keys(o.quantities).forEach(key=>{const q=o.quantities[key];if(!q)return;const[cat,idx]=key.split('__');const p=(PRODUCTS[cat]||[])[parseInt(idx)];if(!p)return;if(!grouped[p.sub])grouped[p.sub]=[];grouped[p.sub].push({name:p.name,unit:p.unit,q});});
    const badges=o.cats.map(c=>'<span class="cat-bdg">'+c+'</span>').join('');
    let groupHtml='';
    Object.keys(grouped).forEach(sub=>{
      groupHtml+='<div class="chef-cat-section"><div class="chef-cat-lbl">'+sub+'</div>';
      grouped[sub].forEach(item=>{groupHtml+='<div class="irow"><span>'+item.name+'</span><span class="irow-q">'+item.q+' '+item.unit+'</span></div>';});
      groupHtml+='</div>';
    });
    html+='<div class="ocard"><div class="ocard-head"><span class="ocard-store">🏪 '+o.storeName+'</span><span class="ocard-date">'+o.date+' '+o.time+'</span></div><div style="margin-bottom:8px">'+badges+'</div>'+groupHtml+'</div>';
  });
  html+='<div class="pdf-btns"><button class="pdf-btn pdf-btn-bc" onclick="genChefPDF(\''+sk+'\',\'bc\')">📄 Bon de commande</button><button class="pdf-btn pdf-btn-bl" onclick="genChefPDF(\''+sk+'\',\'bl\')">🚚 Bon de livraison</button></div>';
  tc.innerHTML=html;
}
function openManager(){
  const tabs=[...MGR_CATS,'stocks_mgr','historique'];
  buildTabs('sm-tabs','sm-tcs',tabs,(cat,tcid)=>{
    if(cat==='stocks_mgr')renderStocks(tcid);
    else if(cat==='historique')renderHistory(tcid);
    else renderMgrCat(tcid,cat);
  },cat=>cat==='stocks_mgr'?'📦 Stocks PDV':cat==='historique'?'🗂 Historique':cat);
  show('sm');
}
function renderMgrCat(tcid,cat){
  const tc=document.getElementById(tcid);
  const prods=PRODUCTS[cat]||[];
  const hasAny=STORE_KEYS.some(sk=>db.manager.filter(o=>o.storeKey===sk).some(o=>prods.some((_,i)=>(o.quantities[cat+'__'+i]||0)>0)));
  if(!hasAny){tc.innerHTML='<div class="mgr-body"><div class="mgr-empty"><div class="empty-ic">📭</div>Aucune commande reçue pour '+cat+'.</div></div>';return;}
  const agg={};
  STORE_KEYS.forEach(sk=>{agg[sk]={};prods.forEach((_,i)=>{agg[sk][i]=db.manager.filter(o=>o.storeKey===sk).reduce((s,o)=>s+(o.quantities[cat+'__'+i]||0),0);});});
  const subsOrder=getSubs(cat);const singleSub=hasSingleSub(cat);
  let html='<div class="mgr-body"><div class="five-cards">';
  STORE_KEYS.forEach(sk=>{
    const icon=STORE_ICONS[sk];const sName=STORE_NAMES[sk];
    const storeTotal=prods.reduce((s,_,i)=>s+(agg[sk][i]||0),0);
    html+='<div class="pdv-card"><div class="pdv-card-head"><span class="pdv-card-name">'+icon+' '+sName+'</span>'+(storeTotal>0?'<span class="pdv-card-total">'+storeTotal+'</span>':'')+'</div>';
    if(storeTotal===0){html+='<div class="pdv-card-empty">Aucune commande</div>';}
    else{
      if(!singleSub){
        subsOrder.forEach(sub=>{
          const subProds=prods.map((p,i)=>({p,i})).filter(({p,i})=>p.sub===sub&&(agg[sk][i]||0)>0);
          if(!subProds.length)return;
          html+='<div class="card-sub"><div class="card-sub-lbl">'+sub+'</div>';
          subProds.forEach(({p,i})=>{html+='<div class="card-item"><span class="card-item-name">'+p.name+'</span><span class="card-item-qty">'+agg[sk][i]+'<span class="card-item-unit"> '+p.unit+'</span></span></div>';});
          html+='</div>';
        });
      }else{
        html+='<div class="card-sub">';
        prods.forEach((p,i)=>{const q=agg[sk][i]||0;if(!q)return;html+='<div class="card-item"><span class="card-item-name">'+p.name+'</span><span class="card-item-qty">'+q+'<span class="card-item-unit"> '+p.unit+'</span></span></div>';});
        html+='</div>';
      }
    }
    html+='</div>';
  });
  html+='</div><div class="pdf-btns" style="padding:0 0 10px"><button class="pdf-btn pdf-btn-mgr" onclick="genMgrPDF(\''+cat+'\')">📄 Bon de commande PDF — '+cat+'</button></div></div>';
  tc.innerHTML=html;
}
function renderHistory(tcid){
  const tc=document.getElementById(tcid);
  if(!db.manager.length){tc.innerHTML='<div class="mgr-body"><div class="mgr-empty"><div class="empty-ic">🗂</div>Aucun historique.</div></div>';return;}
  let html='<div class="mgr-body">';
  [...db.manager].reverse().forEach(o=>{
    const total=Object.values(o.quantities).reduce((a,b)=>a+b,0);
    html+='<div class="ocard" onclick="var d=this.querySelector(\'.hdet\');d.style.display=d.style.display===\'none\'?\'block\':\'none\'"><div class="ocard-head"><span class="ocard-store">🏪 '+o.storeName+'</span><span class="ocard-date">'+o.date+' '+o.time+'</span></div><div style="font-size:10px;color:var(--gr);margin-bottom:4px">'+o.cats.join(' · ')+' · <strong style="color:var(--g)">'+total+' articles</strong> · <em>Cliquer pour détail</em></div><div class="hdet" style="display:none">'+buildItemRows(o.quantities)+'</div></div>';
  });
  html+='</div>';tc.innerHTML=html;
}
function renderStocks(tcid){
  const tc=document.getElementById(tcid);
  if(!db.stocks.length){tc.innerHTML='<div class="mgr-body"><div class="mgr-empty"><div class="empty-ic">📦</div>Aucun stock reçu.</div></div>';return;}
  let html='<div class="mgr-body"><div class="five-cards">';
  STORE_KEYS.forEach(sk=>{
    const icon=STORE_ICONS[sk];const sName=STORE_NAMES[sk];
    const stockEntry=db.stocks.find(s=>s.storeKey===sk);
    html+='<div class="pdv-card"><div class="pdv-card-head stock-card-head"><span class="pdv-card-name">'+icon+' '+sName+'</span>'+(stockEntry?'<span class="pdv-card-total">'+stockEntry.date+'</span>':'')+'</div>';
    if(!stockEntry){html+='<div class="pdv-card-empty">Aucun stock envoyé</div>';}
    else{
      const items=[];
      Object.keys(stockEntry.stocks).forEach(key=>{const q=stockEntry.stocks[key];if(!q||q==0)return;const[cat,idx]=key.split('__');const p=(PRODUCTS[cat]||[])[parseInt(idx)];if(!p)return;items.push({name:p.name,unit:p.unit,cat,q});});
      if(!items.length){html+='<div class="pdv-card-empty">Aucun stock renseigné</div>';}
      else{html+='<div class="card-sub">';items.forEach(item=>{html+='<div class="card-item"><span class="card-item-name">'+item.name+' <span style="font-size:8px;color:var(--lg)">'+item.cat+'</span></span><span class="card-item-qty">'+item.q+'<span class="card-item-unit"> '+item.unit+'</span></span></div>';});html+='</div>';}
    }
    html+='</div>';
  });
  html+='</div></div>';tc.innerHTML=html;
}
function buildItemRows(quantities){
  let rows='';
  Object.keys(quantities).forEach(key=>{const q=quantities[key];if(!q)return;const[cat,idx]=key.split('__');const p=(PRODUCTS[cat]||[])[parseInt(idx)];if(!p)return;rows+='<div class="irow"><span>'+p.name+' <small style="color:var(--lg)">'+cat+'</small></span><span class="irow-q">'+q+' '+p.unit+'</span></div>';});
  return rows;
}
function buildTabs(tabsId,tcsId,keys,renderFn,labelFn){
  const tabsEl=document.getElementById(tabsId),tcsEl=document.getElementById(tcsId);
  tabsEl.innerHTML='';tcsEl.innerHTML='';
  keys.forEach((key,i)=>{
    const btn=document.createElement('button');btn.className='tab'+(i===0?' active':'');btn.textContent=labelFn(key);
    btn.onclick=(k=>()=>{
      document.querySelectorAll('#'+tabsId+' .tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('#'+tcsId+' .tc').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');const tcid=tcsId+'-'+safeId(k);document.getElementById(tcid).classList.add('active');renderFn(k,tcid);
    })(key);
    tabsEl.appendChild(btn);
    const tc=document.createElement('div');tc.className='tc'+(i===0?' active':'');tc.id=tcsId+'-'+safeId(key);tcsEl.appendChild(tc);
    if(i===0)renderFn(key,tc.id);
  });
}
function genChefPDF(sk,type){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const sName=STORE_NAMES[sk];const orders=db.chef.filter(o=>o.storeKey===sk);
  const W=210,M=15;const isBL=type==='bl';const numBL=isBL?nextBLNum(sk):null;
  doc.setFillColor(30,92,58);doc.rect(0,0,W,34,'F');
  doc.setTextColor(245,240,232);doc.setFontSize(20);doc.setFont('helvetica','bold');doc.text('VITALY',M,13);
  doc.setFontSize(12);doc.text(isBL?'BON DE LIVRAISON':'BON DE COMMANDE',M,22);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Point de vente : '+sName,M,30);
  if(isBL){doc.setFont('helvetica','bold');doc.text('N° '+numBL,W-M,22,{align:'right'});doc.setFont('helvetica','normal');}
  doc.text('Date : '+fmtShort(),W-M,30,{align:'right'});
  doc.setFillColor(232,97,58);doc.rect(0,34,W,2,'F');
  doc.setTextColor(30,30,30);let y=42;
  if(!orders.length){doc.setFontSize(11);doc.text('Aucune commande.',M,y);}
  else{
    [...orders].reverse().forEach(o=>{
      if(y>260){doc.addPage();y=20;}
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setFillColor(240,236,228);doc.rect(M,y-4,W-2*M,7,'F');
      doc.text('Commande du '+o.date+' à '+o.time,M+2,y);y+=9;
      const grouped={};
      Object.keys(o.quantities).forEach(key=>{const q=o.quantities[key];if(!q)return;const[cat,idx]=key.split('__');const p=(PRODUCTS[cat]||[])[parseInt(idx)];if(!p)return;if(!grouped[p.sub])grouped[p.sub]=[];grouped[p.sub].push({name:p.name,unit:p.unit,q});});
      Object.keys(grouped).forEach(sub=>{
        if(y>265){doc.addPage();y=20;}
        doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(30,92,58);doc.text(sub,M+2,y);y+=5;
        doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
        grouped[sub].forEach(item=>{if(y>270){doc.addPage();y=20;}doc.text('• '+item.name,M+5,y);doc.text(item.q+' '+item.unit,W-M,y,{align:'right'});y+=5;});y+=2;
      });y+=4;
    });
  }
  if(isBL){if(y>240){doc.addPage();y=20;}y+=10;doc.setDrawColor(180,178,169);doc.line(M,y,M+70,y);doc.line(W-M-70,y,W-M,y);doc.setFontSize(8);doc.setTextColor(136,135,128);doc.text('Signature livreur',M,y+5);doc.text('Signature réceptionnaire',W-M-70,y+5);}
  doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text('VITALY — Généré le '+fmtShort()+' à '+fmtTime(),W/2,290,{align:'center'});
  doc.save((isBL?'BonLivraison':'BonCommande')+'_VITALY_'+sName.replace(/ /g,'_')+'_'+(isBL?numBL:fmtShort().replace(/\//g,'-'))+'.pdf');
}
function genMgrPDF(cat){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const prods=PRODUCTS[cat]||[];const W=210,M=15;
  const subsOrder=getSubs(cat);const singleSub=hasSingleSub(cat);
  STORE_KEYS.forEach((sk,si)=>{
    if(si>0)doc.addPage();
    const sName=STORE_NAMES[sk];
    const agg={};prods.forEach((_,i)=>{agg[i]=db.manager.filter(o=>o.storeKey===sk).reduce((s,o)=>s+(o.quantities[cat+'__'+i]||0),0);});
    const storeTotal=prods.reduce((s,_,i)=>s+(agg[i]||0),0);
    doc.setFillColor(30,92,58);doc.rect(0,0,W,34,'F');
    doc.setTextColor(245,240,232);doc.setFontSize(18);doc.setFont('helvetica','bold');doc.text('VITALY',M,12);
    doc.setFontSize(11);doc.text('BON DE COMMANDE',M,21);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Fournisseur : '+cat,M,29);doc.text('Date : '+fmtShort(),W-M,29,{align:'right'});
    doc.setFillColor(232,97,58);doc.rect(0,34,W,2,'F');
    doc.setFillColor(240,236,228);doc.rect(M,38,W-2*M,9,'F');
    doc.setTextColor(30,92,58);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('Point de vente : '+sName,M+3,44);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(136,135,128);doc.text('Total : '+storeTotal+' article(s)',W-M,44,{align:'right'});
    let y=54;doc.setTextColor(30,30,30);
    if(storeTotal===0){doc.setFontSize(10);doc.setTextColor(136,135,128);doc.text('Aucune commande pour ce point de vente.',M,y);}
    else{
      if(!singleSub){
        subsOrder.forEach(sub=>{
          const subProds=prods.map((p,i)=>({p,i})).filter(({p,i})=>p.sub===sub&&(agg[i]||0)>0);
          if(!subProds.length)return;
          if(y>265){doc.addPage();y=20;}
          doc.setFillColor(30,92,58);doc.rect(M,y-4,W-2*M,6,'F');
          doc.setTextColor(245,240,232);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text(sub.toUpperCase(),M+2,y);y+=5;
          doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
          doc.setFillColor(245,240,232);doc.rect(M,y,W-2*M,6,'F');
          doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(30,92,58);doc.text('Produit',M+2,y+4);doc.text('Unité',W-M-30,y+4);doc.text('Qté',W-M,y+4,{align:'right'});
          y+=8;doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
          subProds.forEach(({p,i},pi)=>{
            if(y>272){doc.addPage();y=20;}
            if(pi%2===0){doc.setFillColor(252,252,252);doc.rect(M,y-3,W-2*M,6,'F');}
            doc.setFontSize(8);doc.text(p.name,M+2,y+1);doc.text(p.unit,W-M-30,y+1);doc.text(String(agg[i]),W-M,y+1,{align:'right'});
            doc.setDrawColor(220,218,212);doc.line(M,y+3,W-M,y+3);y+=6;
          });y+=4;
        });
      }else{
        if(y>265){doc.addPage();y=20;}
        doc.setFillColor(245,240,232);doc.rect(M,y,W-2*M,6,'F');
        doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(30,92,58);doc.text('Produit',M+2,y+4);doc.text('Unité',W-M-30,y+4);doc.text('Qté',W-M,y+4,{align:'right'});
        y+=8;doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
        prods.forEach((p,i)=>{const q=agg[i]||0;if(!q)return;if(y>272){doc.addPage();y=20;}doc.setFontSize(8);doc.text(p.name,M+2,y+1);doc.text(p.unit,W-M-30,y+1);doc.text(String(q),W-M,y+1,{align:'right'});doc.setDrawColor(220,218,212);doc.line(M,y+3,W-M,y+3);y+=6;});
      }
    }
    doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text('VITALY — '+cat+' — Généré le '+fmtShort()+' à '+fmtTime(),W/2,290,{align:'center'});
  });
  doc.save('BonCommande_VITALY_'+cat.replace(/ /g,'_')+'_'+fmtShort().replace(/\//g,'-')+'.pdf');
}
